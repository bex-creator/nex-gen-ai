<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Qwen Coder AI</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        h1 { color: #58a6ff; }
        #chat-box {
            height: 500px;
            overflow-y: auto;
            border: 1px solid #30363d;
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #161b22;
            border-radius: 6px;
        }
        .message {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        .user {
            background-color: #1f6feb;
            color: white;
            margin-left: 20%;
        }
        .bot {
            background-color: #21262d;
            border: 1px solid #30363d;
            margin-right: 20%;
        }
        #input-container { display: flex; gap: 0.5rem; }
        input[type="text"] {
            flex: 1;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 1rem;
        }
        button {
            padding: 0 1.5rem;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        #status {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #161b22;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Local Qwen2.5-Coder (WebGPU)</h1>
    <div id="status">Status: Initializing... (The first time you run this, it will download ~4GB to your browser cache. Please wait.)</div>
    
    <div id="chat-box"></div>
    
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a coding question..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        // This is the 7-Billion parameter Qwen2.5 Coder model, optimized for WebGPU
        const selectedModel = "Qwen2.5-Coder-7B-Instruct-q4f16_1-MLC";
        
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const statusText = document.getElementById("status");

        let engine;
        let messages = [
            { role: "system", content: "You are a highly capable coding assistant. Provide clean, efficient code." }
        ];

        async function initAI() {
            try {
                // Create the engine and track the download/loading progress
                engine = await CreateMLCEngine(selectedModel, {
                    initProgressCallback: (progress) => {
                        statusText.innerText = `Status: ${progress.text}`;
                    }
                });
                
                statusText.innerText = "Status: Ready! Running locally on your 5060 Ti via WebGPU.";
                statusText.style.color = "#3fb950";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            } catch (error) {
                statusText.innerText = "Error: Could not load the model. Make sure you are using a Chromium-based browser (Chrome/Edge) with WebGPU enabled.";
                statusText.style.color = "#f85149";
                console.error(error);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Display user message
            appendMessage("You", text, "user");
            messages.push({ role: "user", content: text });
            
            // Lock UI while generating
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const botDiv = appendMessage("Qwen", "...", "bot");

            try {
                // Stream the response from the local WebGPU model
                const chunks = await engine.chat.completions.create({
                    messages: messages,
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    fullResponse += content;
                    botDiv.innerText = `Qwen:\n\n${fullResponse}`;
                }
                
                messages.push({ role: "assistant", content: fullResponse });
            } catch (error) {
                botDiv.innerText = "Error generating response. Check the console.";
                console.error(error);
            }

            // Unlock UI
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(sender, text, className) {
            const div = document.createElement("div");
            div.className = `message ${className}`;
            div.innerText = `${sender}:\n\n${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Boot up the AI when the page loads
        initAI();
    </script>
</body>
</html>
