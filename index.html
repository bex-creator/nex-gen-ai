<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <style>
        :root {
            --bg-color: #131314;
            --input-bg: #1e1e20;
            --text-color: #e3e3e3;
            --text-secondary: #aaaaaa;
            --accent-gradient: linear-gradient(90deg, #4285f4, #9b51e0, #e91e63);
            --user-msg-bg: #2a2b2d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            padding: 1.5rem 1rem 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-right {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: #1e1e20;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            border: 1px solid #3c4043;
        }

        .header-btn {
            background: #1e1e20;
            border: 1px solid #3c4043;
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .header-btn:hover {
            background: #2a2b2d;
            color: var(--text-color);
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 2rem 1rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #303030;
            border-radius: 4px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
            width: 100%;
        }

        .sender-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            margin-left: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message {
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message {
            background-color: var(--user-msg-bg);
            color: var(--text-color);
            border-bottom-right-radius: 4px;
        }

        .bot .message {
            background-color: transparent;
            color: var(--text-color);
            padding-left: 0.5rem;
        }

        #input-area {
            width: 100%;
            max-width: 800px;
            padding: 1rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            display: flex;
            width: 100%;
            background-color: var(--input-bg);
            border-radius: 32px;
            padding: 0.4rem 0.5rem 0.4rem 1.5rem;
            box-sizing: border-box;
            align-items: center;
            transition: box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 2px #3c4043;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1rem;
            padding: 0.8rem 0;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #8ab4f8;
            cursor: pointer;
            padding: 0.8rem;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        .icon-btn:disabled {
            color: #4a4a4a;
            cursor: not-allowed;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        #mic-btn.listening {
            color: #ea4335;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .footer-note {
            font-size: 0.7rem;
            color: #747775;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>Nexus AI</h1>
            <div id="status" class="status-badge">Brain: Initializing WebGPU...</div>
        </div>
        <div class="header-right">
            <button id="voice-toggle-btn" class="header-btn">🔊 Voice: On</button>
            <button id="clear-btn" class="header-btn">Clear Chat</button>
        </div>
    </header>
    
    <div id="chat-container"></div>
    
    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask Nexus AI something..." disabled>
            <button id="mic-btn" class="icon-btn" disabled aria-label="Speak">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.72V21h2v-3.28c3.28-.52 6-3.3 6-6.72h-1.7z"></path></svg>
            </button>
            <button id="send-btn" class="icon-btn" disabled aria-label="Send message">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
        <div class="footer-note">Qwen2.5-Coder runs on GPU. Voice runs instantly via Free Web Speech API.</div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const selectedModel = "Qwen2.5-Coder-7B-Instruct-q4f16_1-MLC";
        const STORAGE_KEY = "nexus_ai_chat_history";
        
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const micBtn = document.getElementById("mic-btn");
        const clearBtn = document.getElementById("clear-btn");
        const voiceToggleBtn = document.getElementById("voice-toggle-btn");
        const statusText = document.getElementById("status");

        let engine;
        let messages = [];
        let isVoiceEnabled = true;

        const systemMessage = { 
            role: "system", 
            content: "You are Nexus AI, a highly advanced local coding assistant. Keep explanations extremely concise and speak directly, as your responses are read aloud via text-to-speech." 
        };

        // --- Free Browser Native TTS Setup ---
        const synth = window.speechSynthesis;
        let availableVoices = [];

        // Pre-load voices (browsers load these asynchronously)
        function loadVoices() {
            availableVoices = synth.getVoices();
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function stopAudio() {
            synth.cancel();
        }

        function playNativeAudio(text) {
            if (!isVoiceEnabled) return;

            // Strip out markdown symbols and URLs for smooth speech
            let cleanText = text.replace(/```/g, " ")
                                .replace(/[#*`~>]/g, '')
                                .replace(/https?:\/\/[^\s]+/g, "a link")
                                .trim();

            if (!cleanText) return;

            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Try to pick the best sounding, most realistic voice available
            let bestVoice = availableVoices.find(v => v.name.includes("Google US English")) ||
                            availableVoices.find(v => v.name.includes("Microsoft") && v.name.includes("Online")) ||
                            availableVoices.find(v => v.lang === "en-US");

            if (bestVoice) {
                utterance.voice = bestVoice;
            }
            
            // Slight adjustments for more natural cadence
            utterance.rate = 1.05; 
            utterance.pitch = 1;

            synth.speak(utterance);
        }

        voiceToggleBtn.addEventListener("click", () => {
            isVoiceEnabled = !isVoiceEnabled;
            if (!isVoiceEnabled) {
                stopAudio();
                voiceToggleBtn.innerText = "🔇 Voice: Off";
            } else {
                voiceToggleBtn.innerText = "🔊 Voice: On";
            }
        });

        // --- Voice Setup: Speech to Text (Microphone) ---
        let recognition;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                micBtn.classList.add("listening");
                userInput.placeholder = "Listening...";
            };

            recognition.onerror = () => stopListening();
            recognition.onend = () => stopListening();

            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                sendMessage(); 
            };
        } else {
            micBtn.style.display = "none"; 
        }

        function stopListening() {
            micBtn.classList.remove("listening");
            userInput.placeholder = "Ask Nexus AI something...";
        }

        micBtn.addEventListener("click", () => {
            if (micBtn.classList.contains("listening")) {
                recognition.stop();
            } else {
                stopAudio();
                recognition.start();
            }
        });

        // --- Chat Logic & Main AI ---
        function loadHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                    messages.forEach(msg => {
                        if (msg.role === "user") appendMessage("You", msg.content, "user");
                        if (msg.role === "assistant") appendMessage("Nexus AI", msg.content, "bot");
                    });
                } catch (e) {
                    messages = [systemMessage];
                }
            } else {
                messages = [systemMessage];
            }
        }

        clearBtn.addEventListener("click", () => {
            if(confirm("Wipe chat memory?")) {
                stopAudio();
                localStorage.removeItem(STORAGE_KEY);
                messages = [systemMessage];
                chatContainer.innerHTML = "";
            }
        });

        async function initAI() {
            loadHistory();

            try {
                engine = await CreateMLCEngine(selectedModel, {
                    initProgressCallback: (progress) => {
                        statusText.innerText = "Brain: " + progress.text.replace(/\[.*\]/, '').trim();
                    }
                });
                
                statusText.innerText = "Brain: GPU Active";
                statusText.style.borderColor = "#0f9d58";
                userInput.disabled = false;
                sendBtn.disabled = false;
                micBtn.disabled = false;
                userInput.focus();
            } catch (error) {
                statusText.innerText = "Brain: Error";
                statusText.style.borderColor = "#ea4335";
                console.error(error);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            stopAudio();

            appendMessage("You", text, "user");
            messages.push({ role: "user", content: text });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;
            micBtn.disabled = true;

            const botElements = appendMessage("Nexus AI", "Thinking...", "bot");
            let sentenceBuffer = "";

            try {
                const chunks = await engine.chat.completions.create({
                    messages: messages,
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    fullResponse += content;
                    sentenceBuffer += content;
                    
                    botElements.textElement.innerText = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;

                    // Stream Audio: Split by sentence markers and play natively
                    let endIdx = sentenceBuffer.search(/[\.!\?](?:\s|\n|$)|(\n\n)/);
                    while (endIdx !== -1) {
                        let splitIndex = endIdx + 1;
                        let sentence = sentenceBuffer.substring(0, splitIndex);
                        
                        playNativeAudio(sentence);
                        
                        sentenceBuffer = sentenceBuffer.substring(splitIndex).trimStart();
                        endIdx = sentenceBuffer.search(/[\.!\?](?:\s|\n|$)|(\n\n)/);
                    }
                }
                
                if (sentenceBuffer.trim().length > 0) {
                    playNativeAudio(sentenceBuffer);
                }

                messages.push({ role: "assistant", content: fullResponse });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
                
            } catch (error) {
                botElements.textElement.innerText = "An error occurred during local generation.";
                console.error(error);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            micBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(sender, text, type) {
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${type}`;

            const nameDiv = document.createElement("div");
            nameDiv.className = "sender-name";
            nameDiv.innerText = sender;

            const msgDiv = document.createElement("div");
            msgDiv.className = "message";
            msgDiv.innerText = text;

            wrapper.appendChild(nameDiv);
            wrapper.appendChild(msgDiv);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return { textElement: msgDiv };
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        initAI();
    </script>
</body>
</html>
