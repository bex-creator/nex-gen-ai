<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 2.5 Local Web AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .loader { border-top-color: #a855f7; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Sleek scrollbar system */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen overflow-hidden flex flex-col font-sans antialiased">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const Icons = {
            Send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>,
            Code: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>,
            X: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
            Cpu: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z"></path></svg>
        };

        const MODELS = [
            { id: "Qwen2.5-0.5B-Instruct-q4f16_1-MLC", name: "Qwen 2.5 (0.5B) - Lightning Fast (~350MB)" },
            { id: "Qwen2.5-1.5B-Instruct-q4f16_1-MLC", name: "Qwen 2.5 (1.5B) - Recommended balanced (~1GB)" },
            { id: "Qwen2.5-Coder-1.5B-Instruct-q4f16_1-MLC", name: "Qwen 2.5 Coder (1.5B) - Core Programming (~1GB)" }
        ];

        function App() {
            const [engine, setEngine] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [modelLoading, setModelLoading] = useState(false);
            const [selectedModel, setSelectedModel] = useState(MODELS[0].id);
            const [progressText, setProgressText] = useState("");
            const [progressPercent, setProgressPercent] = useState(0);
            const [hasWebGPU, setHasWebGPU] = useState(true);

            const [messages, setMessages] = useState([{ role: "assistant", content: "Local execution stack loaded successfully. I am operating completely offline via WebGPU kernels. Let me build or verify something for you!" }]);
            const [input, setInput] = useState("");
            const [generating, setGenerating] = useState(false);
            
            // Artifacts Panel Layout States
            const [workspaceOpen, setWorkspaceOpen] = useState(false);
            const [workspaceContent, setWorkspaceContent] = useState("");
            const [workspaceType, setWorkspaceType] = useState("html");

            const chatEndRef = useRef(null);

            useEffect(() => {
                if (!navigator.gpu) {
                    setHasWebGPU(false);
                }
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, generating]);

            // Scan and render code changes into workspace
            useEffect(() => {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg && lastMsg.role === "assistant" && !generating) {
                    const htmlMatch = lastMsg.content.match(/```html([\s\S]*?)```/);
                    if (htmlMatch) {
                        setWorkspaceContent(htmlMatch[1].trim());
                        setWorkspaceType("html");
                        setWorkspaceOpen(true);
                    }
                }
            }, [messages, generating]);

            const handleInitEngine = async () => {
                setModelLoading(true);
                setProgressPercent(0);
                setProgressText("Fetching local engine configuration libraries...");
                
                try {
                    const webllmModule = await import("https://esm.run/@mlc-ai/web-llm");
                    const newEngine = await webllmModule.CreateMLCEngine(selectedModel, {
                        initProgressCallback: (progress) => {
                            if (progress && typeof progress.progress === 'number') {
                                setProgressPercent(Math.floor(progress.progress * 100));
                            }
                            if (progress && progress.text) {
                                setProgressText(progress.text);
                            }
                        }
                    });
                    setEngine(newEngine);
                    setIsReady(true);
                } catch (err) {
                    console.error(err);
                    setProgressText(`Error spinning up client-side modules: ${err.message}`);
                    setModelLoading(false);
                }
            };

            const handleSend = async () => {
                if (!input.trim() || generating || !engine) return;

                const userMsg = { role: "user", content: input };
                const newMessages = [...messages, userMsg];
                setMessages(newMessages);
                setInput("");
                setGenerating(true);

                // Prepend empty template for the streaming assistant response
                setMessages(prev => [...prev, { role: "assistant", content: "" }]);

                try {
                    const systemContext = "You are a highly capable AI assistant powered by Qwen 2.5 running locally in the browser via WebGPU. When generating web components or interactive applications, always return the complete solution code enclosed cleanly in a single ```html block including all necessary CSS and script rules.";
                    
                    const chatHistory = [
                        { role: "system", content: systemContext },
                        ...newMessages
                    ];

                    const chunks = await engine.chat.completions.create({
                        messages: chatHistory,
                        stream: true,
                        temperature: 0.6
                    });

                    let runningReply = "";
                    for await (const chunk of chunks) {
                        const token = chunk.choices[0]?.delta?.content || "";
                        runningReply += token;
                        
                        setMessages(prev => {
                            const updated = [...prev];
                            updated[updated.length - 1].content = runningReply;
                            return updated;
                        });
                    }
                } catch (error) {
                    console.error(error);
                    setMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1].content = `❌ **Local inference error encountered:** ${error.message}`;
                        return updated;
                    });
                } finally {
                    setGenerating(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            const renderMessageContent = (text) => {
                if (!text) return null;
                const parts = text.split(/(```[\s\S]*?```)/g);
                return parts.map((part, i) => {
                    if (part.startsWith("```")) {
                        const lines = part.split("\n");
                        const lang = lines[0].replace("```", "").trim();
                        const code = lines.slice(1, -1).join("\n");
                        return (
                            <div key={i} className="my-3 border border-slate-700 rounded-lg overflow-hidden bg-slate-900 shadow-md">
                                <div className="bg-slate-800 text-slate-400 px-3 py-1.5 text-xs flex justify-between items-center border-b border-slate-700">
                                    <span className="font-mono">{lang || "code"}</span>
                                    {lang === "html" && (
                                        <button 
                                            onClick={() => { setWorkspaceContent(code); setWorkspaceType("html"); setWorkspaceOpen(true); }}
                                            className="text-purple-400 hover:text-purple-300 flex items-center gap-1 font-semibold"
                                        >
                                            ⚡ Render Workspace
                                        </button>
                                    )}
                                </div>
                                <pre className="p-4 text-xs overflow-x-auto text-slate-300 font-mono leading-relaxed">
                                    <code>{code}</code>
                                </pre>
                            </div>
                        );
                    }
                    let formatted = part.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    return <span key={i} dangerouslySetInnerHTML={{ __html: formatted.replace(/\n/g, '<br/>') }} />;
                });
            };

            // Initial Engine Selection & Loading Dashboard
            if (!isReady) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-6 max-w-xl mx-auto text-center space-y-6">
                        <div className="w-16 h-16 bg-purple-600/10 text-purple-400 border border-purple-500/20 rounded-2xl flex items-center justify-center font-bold text-3xl shadow-xl">
                            Q
                        </div>
                        <div>
                            <h2 className="text-2xl font-bold tracking-tight text-slate-100">Local Browser AI Sandbox</h2>
                            <p className="text-slate-400 text-sm mt-2">
                                Powered by **WebLLM & Qwen 2.5**. This completely overrides backend configurations and processes raw tokens directly inside your browser graphics layer.
                            </p>
                        </div>

                        {!hasWebGPU && (
                            <div className="w-full bg-red-950/40 border border-red-500/20 text-red-300 rounded-xl p-4 text-left text-xs leading-relaxed">
                                <strong>⚠️ WebGPU Driver Missing:</strong> Your active hardware layout or browser version doesn't support local hardware acceleration pipelines. Ensure WebGPU flags are turned on inside Google Chrome or Microsoft Edge.
                            </div>
                        )}

                        <div className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4 shadow-2xl">
                            <div className="text-left">
                                <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Compute Allocation</label>
                                <select 
                                    value={selectedModel}
                                    onChange={(e) => setSelectedModel(e.target.value)}
                                    disabled={modelLoading}
                                    className="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 outline-none focus:border-purple-500 disabled:opacity-40 transition-colors"
                                >
                                    {MODELS.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </div>

                            {modelLoading ? (
                                <div className="space-y-3 pt-2 text-left">
                                    <div className="flex justify-between text-xs font-semibold text-slate-300">
                                        <span className="truncate max-w-[80%] font-mono text-slate-400">{progressText || "Downloading environment maps..."}</span>
                                        <span>{progressPercent}%</span>
                                    </div>
                                    <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden border border-slate-800">
                                        <div className="bg-gradient-to-r from-purple-500 to-indigo-500 h-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
                                    </div>
                                    <p className="text-[10px] text-slate-500 text-center font-medium">Initial downloads are safely stored inside your browser index cache storage for instant subsequent re-runs.</p>
                                </div>
                            ) : (
                                <button
                                    onClick={handleInitEngine}
                                    disabled={!hasWebGPU}
                                    className="w-full bg-purple-600 hover:bg-purple-500 text-white font-semibold text-sm py-3 px-4 rounded-xl transition duration-200 shadow-lg disabled:opacity-20"
                                >
                                    Initialize Local Engine
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            // Primary Operating Chat & Code Interface
            return (
                <div className="flex h-full w-full bg-slate-950">
                    
                    {/* Left Interface Core Panel */}
                    <div className={`flex flex-col h-full transition-all duration-300 ease-in-out ${workspaceOpen ? 'w-1/2 border-r border-slate-800' : 'w-full max-w-4xl mx-auto'}`}>
                        
                        <header className="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur z-10">
                            <div className="flex items-center gap-3">
                                <div className="w-7 h-7 rounded-lg bg-purple-600/20 text-purple-400 border border-purple-500/30 flex items-center justify-center font-bold text-sm shadow">
                                    Q
                                </div>
                                <div>
                                    <h1 className="text-sm font-semibold text-slate-200">Qwen Client Environment</h1>
                                    <p className="text-[10px] font-mono text-emerald-400 flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                        WebGPU Local Active
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {workspaceOpen && (
                                    <button onClick={() => setWorkspaceOpen(false)} className="p-2 text-slate-400 hover:text-slate-200 rounded-lg bg-slate-800 border border-slate-700 transition" title="Toggle Sidebar">
                                        <Icons.Code />
                                    </button>
                                )}
                            </div>
                        </header>

                        {/* Conversational Screen Frame */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-950/40">
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] rounded-2xl p-4 shadow-sm text-sm border ${msg.role === 'user' ? 'bg-purple-600 text-white border-purple-500 rounded-br-none' : 'bg-slate-900 text-slate-200 border-slate-800 rounded-bl-none'}`}>
                                        <div className="leading-relaxed whitespace-pre-wrap">
                                            {renderMessageContent(msg.content)}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {generating && (
                                <div className="flex justify-start">
                                    <div className="bg-slate-900 border border-slate-800 rounded-2xl rounded-bl-none p-4 flex items-center gap-3 shadow-md">
                                        <div className="loader ease-linear rounded-full border-2 border-t-2 border-slate-700 h-4 w-4"></div>
                                        <span className="text-xs text-slate-400 font-medium">Qwen executing instructions locally...</span>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Prompt Input Framework */}
                        <div className="p-4 bg-slate-900/60 border-t border-slate-800/80">
                            <div className="relative flex items-end bg-slate-950 border border-slate-800 rounded-xl overflow-hidden focus-within:border-purple-500 transition-colors shadow-inner">
                                <textarea
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="Request an interface or local operational tool logic..."
                                    className="w-full max-h-32 bg-transparent text-slate-100 p-3 outline-none resize-none overflow-y-auto text-sm leading-relaxed"
                                    rows="1"
                                    style={{ minHeight: '48px' }}
                                    disabled={generating}
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim() || generating}
                                    className="p-3 text-purple-400 hover:text-purple-300 disabled:text-slate-700 transition-colors"
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                            <div className="flex gap-2 mt-2.5 px-0.5">
                                <button onClick={() => setInput("Build a dynamic CSS digital counter application inside a code block structure.")} className="text-[11px] font-medium bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-300 rounded-full px-3 py-1 border border-slate-800 transition">🕰️ Build UI Counter</button>
                                <button onClick={() => setInput("Write a quick responsive HTML registration card profile.")} className="text-[11px] font-medium bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-300 rounded-full px-3 py-1 border border-slate-800 transition">📝 Interactive Card</button>
                            </div>
                        </div>
                    </div>

                    {/* Right Interface Artifact Live Panel */}
                    {workspaceOpen && (
                        <div className="w-1/2 h-full flex flex-col bg-white border-l border-slate-300 animate-fade-in-right">
                            <div className="flex justify-between items-center p-2 bg-slate-100 border-b border-slate-300 shadow-sm">
                                <div className="flex items-center gap-2 text-slate-700 text-xs font-semibold px-2">
                                    <Icons.Cpu /> 
                                    <span>Interactive Sandbox Output</span>
                                </div>
                                <button onClick={() => setWorkspaceOpen(false)} className="text-slate-400 hover:text-slate-800 p-1 rounded-md hover:bg-slate-200 transition">
                                    <Icons.X />
                                </button>
                            </div>
                            <div className="flex-1 bg-white relative">
                                <iframe 
                                    title="Local Live Preview Container"
                                    srcDoc={workspaceContent} 
                                    className="w-full h-full border-none bg-white"
                                    sandbox="allow-scripts allow-modals"
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
