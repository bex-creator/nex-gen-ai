<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 2.5 AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .loader { border-top-color: #8b5cf6; -webkit-animation: spinner 1s linear infinite; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom scrollbar for a sleek look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .prose pre { background-color: #1f2937; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; border: 1px solid #374151; }
        .prose code { font-family: monospace; color: #a5b4fc; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 h-screen overflow-hidden flex flex-col font-sans antialiased">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const Icons = {
            Send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>,
            Code: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>,
            X: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
            Play: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        };

        const MODELS = [
            { id: "Qwen/Qwen2.5-72B-Instruct", name: "Qwen 2.5 (72B) - General" },
            { id: "Qwen/Qwen2.5-Coder-32B-Instruct", name: "Qwen 2.5 Coder (32B)" },
            { id: "Qwen/Qwen2.5-Math-72B-Instruct", name: "Qwen 2.5 Math (72B)" }
        ];

        function App() {
            const [messages, setMessages] = useState([{ role: "assistant", content: "Hello! I am Qwen 2.5. I am connected via the Hugging Face Inference API. How can I help you today?" }]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem("hf_api_key") || "");
            const [selectedModel, setSelectedModel] = useState(MODELS[0].id);
            const [showSettings, setShowSettings] = useState(!apiKey);
            
            // Workspace states
            const [workspaceOpen, setWorkspaceOpen] = useState(false);
            const [workspaceContent, setWorkspaceContent] = useState("");
            const [workspaceType, setWorkspaceType] = useState("html"); // html or markdown

            const chatEndRef = useRef(null);

            // Auto-scroll to bottom of chat
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, loading]);

            // Save API key to local storage
            useEffect(() => {
                if (apiKey) localStorage.setItem("hf_api_key", apiKey);
            }, [apiKey]);

            // Parse artifacts (HTML/JS/CSS code blocks) from messages
            useEffect(() => {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg && lastMsg.role === "assistant") {
                    const htmlMatch = lastMsg.content.match(/```html([\s\S]*?)```/);
                    if (htmlMatch) {
                        setWorkspaceContent(htmlMatch[1].trim());
                        setWorkspaceType("html");
                        setWorkspaceOpen(true);
                    }
                }
            }, [messages]);

            const formatPromptForQwen = (msgs) => {
                let prompt = "";
                // System prompt to encourage generating HTML artifacts if asked
                prompt += `<|im_start|>system\nYou are a highly capable AI assistant based on the Qwen 2.5 architecture. You are helpful, brilliant, and accurate. If the user asks for a UI, web component, app, or game, provide the complete, runnable code inside a single \`\`\`html code block. Include CSS and JS within the HTML file.<|im_end|>\n`;
                
                msgs.forEach(m => {
                    prompt += `<|im_start|>${m.role}\n${m.content}<|im_end|>\n`;
                });
                prompt += `<|im_start|>assistant\n`;
                return prompt;
            };

            const handleSend = async () => {
                if (!input.trim()) return;
                
                const userMsg = { role: "user", content: input };
                const newMessages = [...messages, userMsg];
                setMessages(newMessages);
                setInput("");
                setLoading(true);

                if (!apiKey) {
                    // Offline / Demo fallback mode
                    setTimeout(() => {
                        setMessages([...newMessages, { 
                            role: "assistant", 
                            content: "⚠️ **No API Key detected.** \n\nPlease open the settings (gear icon) and enter your Hugging Face API key to connect to the live Qwen 2.5 models.\n\n*If you want to test the workspace panel, ask me to build a clock or a calculator!*" 
                        }]);
                        setLoading(false);
                    }, 1000);
                    return;
                }

                try {
                    const response = await fetch(`https://api-inference.huggingface.co/models/${selectedModel}`, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            inputs: formatPromptForQwen(newMessages),
                            parameters: {
                                max_new_tokens: 2048,
                                temperature: 0.7,
                                top_p: 0.9,
                                return_full_text: false
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || `HTTP Error ${response.status}`);
                    }

                    const data = await response.json();
                    let replyText = data[0].generated_text || "";
                    
                    // Clean up trailing tags if any
                    replyText = replyText.replace(/<\|im_end\|>$/, "").trim();

                    setMessages([...newMessages, { role: "assistant", content: replyText }]);
                } catch (error) {
                    console.error("API Error:", error);
                    setMessages([...newMessages, { 
                        role: "assistant", 
                        content: `❌ **Error connecting to model:** ${error.message}\n\n*Check your API key, or ensure the selected model is currently loaded in Hugging Face Serverless Inference.*` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            // Basic Markdown renderer for chat messages
            const renderMessageContent = (text) => {
                const parts = text.split(/(```[\s\S]*?```)/g);
                return parts.map((part, i) => {
                    if (part.startsWith("```")) {
                        const lines = part.split("\n");
                        const lang = lines[0].replace("```", "").trim();
                        const code = lines.slice(1, -1).join("\n");
                        return (
                            <div key={i} className="my-2 border border-gray-700 rounded-md overflow-hidden">
                                <div className="bg-gray-800 text-gray-400 px-3 py-1 text-xs flex justify-between items-center">
                                    <span>{lang || "code"}</span>
                                    {lang === "html" && (
                                        <button 
                                            onClick={() => { setWorkspaceContent(code); setWorkspaceType("html"); setWorkspaceOpen(true); }}
                                            className="text-purple-400 hover:text-purple-300 flex items-center gap-1"
                                        >
                                            <Icons.Play /> Open in Workspace
                                        </button>
                                    )}
                                </div>
                                <pre className="p-3 bg-gray-900 text-sm overflow-x-auto text-gray-300">
                                    <code>{code}</code>
                                </pre>
                            </div>
                        );
                    }
                    
                    // Handle bold and basic paragraphs
                    let formatted = part.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    return <span key={i} dangerouslySetInnerHTML={{ __html: formatted.replace(/\n/g, '<br/>') }} />;
                });
            };

            return (
                <div className="flex h-full w-full bg-gray-950">
                    
                    {/* Left Panel: Chat Interface */}
                    <div className={`flex flex-col h-full transition-all duration-300 ease-in-out ${workspaceOpen ? 'w-1/2 border-r border-gray-800' : 'w-full max-w-4xl mx-auto'}`}>
                        
                        {/* Header */}
                        <header className="flex justify-between items-center p-4 border-b border-gray-800 bg-gray-900 shadow-sm z-10">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-white font-bold shadow-lg">
                                    Q
                                </div>
                                <div>
                                    <h1 className="text-lg font-semibold text-gray-100">Qwen 2.5 AI</h1>
                                    <p className="text-xs text-purple-400 flex items-center gap-1">
                                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                        {selectedModel.split("/")[1]}
                                    </p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {workspaceOpen && (
                                    <button onClick={() => setWorkspaceOpen(false)} className="p-2 text-gray-400 hover:text-white rounded bg-gray-800 hover:bg-gray-700 transition" title="Close Workspace">
                                        <Icons.Code />
                                    </button>
                                )}
                                <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded transition ${showSettings ? 'bg-purple-600 text-white' : 'text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700'}`}>
                                    <Icons.Settings />
                                </button>
                            </div>
                        </header>

                        {/* Settings Dropdown */}
                        {showSettings && (
                            <div className="absolute top-16 right-4 w-80 bg-gray-800 border border-gray-700 rounded-lg shadow-2xl p-4 z-50 animate-fade-in">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-semibold text-gray-200">Settings</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-gray-400 hover:text-white"><Icons.X /></button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Model Selection</label>
                                        <select 
                                            value={selectedModel} 
                                            onChange={(e) => setSelectedModel(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-purple-500"
                                        >
                                            {MODELS.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Hugging Face API Token</label>
                                        <input 
                                            type="password" 
                                            value={apiKey} 
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxx"
                                            className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-purple-500"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Requires an API key to access live inference. Kept locally in browser.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Chat History */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth bg-gray-950">
                            {messages.map((msg, index) => (
                                <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] rounded-2xl p-4 shadow-sm ${msg.role === 'user' ? 'bg-purple-600 text-white rounded-br-none' : 'bg-gray-800 text-gray-200 rounded-bl-none border border-gray-700'}`}>
                                        <div className="prose prose-invert max-w-none text-sm leading-relaxed">
                                            {renderMessageContent(msg.content)}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex justify-start">
                                    <div className="bg-gray-800 border border-gray-700 rounded-2xl rounded-bl-none p-4 flex items-center gap-3">
                                        <div className="loader ease-linear rounded-full border-2 border-t-2 border-gray-600 h-5 w-5"></div>
                                        <span className="text-sm text-gray-400">Qwen is thinking...</span>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Input Area */}
                        <div className="p-4 bg-gray-900 border-t border-gray-800">
                            <div className="relative flex items-end bg-gray-800 border border-gray-700 rounded-xl overflow-hidden focus-within:border-purple-500 transition-colors shadow-inner">
                                <textarea
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="Ask Qwen to code a snake game, solve a math problem, or explain a concept..."
                                    className="w-full max-h-32 bg-transparent text-gray-100 p-3 outline-none resize-none overflow-y-auto text-sm"
                                    rows="1"
                                    style={{ minHeight: '50px' }}
                                    disabled={loading}
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim() || loading}
                                    className="p-3 text-purple-400 hover:text-purple-300 disabled:text-gray-600 transition-colors"
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                            <div className="flex gap-2 mt-2 px-1">
                                <button onClick={() => setInput("Build a beautiful, interactive digital clock using HTML, CSS, and JS in a single file.")} className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 rounded-full px-3 py-1 border border-gray-700">🕰️ Build a Clock</button>
                                <button onClick={() => setInput("Write a python script to implement a simple neural network from scratch using numpy.")} className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 rounded-full px-3 py-1 border border-gray-700">🧠 Neural Net</button>
                            </div>
                        </div>
                    </div>

                    {/* Right Panel: Artifacts Workspace */}
                    {workspaceOpen && (
                        <div className="w-1/2 h-full flex flex-col bg-white animate-fade-in-right">
                            <div className="flex justify-between items-center p-2 bg-gray-100 border-b border-gray-300">
                                <div className="flex items-center gap-2 text-gray-700 text-sm font-medium px-2">
                                    <Icons.Code /> 
                                    <span>Artifact Workspace</span>
                                </div>
                                <button onClick={() => setWorkspaceOpen(false)} className="text-gray-500 hover:text-gray-900 p-1">
                                    <Icons.X />
                                </button>
                            </div>
                            <div className="flex-1 bg-white relative">
                                {workspaceType === "html" ? (
                                    <iframe 
                                        title="Workspace Preview"
                                        srcDoc={workspaceContent} 
                                        className="w-full h-full border-none bg-white"
                                        sandbox="allow-scripts allow-modals"
                                    />
                                ) : (
                                    <div className="p-6 h-full overflow-y-auto text-gray-900">
                                        <pre><code>{workspaceContent}</code></pre>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
