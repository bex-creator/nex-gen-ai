<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <style>
        :root {
            --bg-color: #131314;
            --input-bg: #1e1e20;
            --text-color: #e3e3e3;
            --text-secondary: #aaaaaa;
            --accent-gradient: linear-gradient(90deg, #4285f4, #9b51e0, #e91e63);
            --user-msg-bg: #2a2b2d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            padding: 1.5rem 1rem 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        #status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: #1e1e20;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            max-width: 60%;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        #chat-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 2rem 1rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Scrollbar styling */
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #303030;
            border-radius: 4px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
            width: 100%;
        }

        .sender-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            margin-left: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user .sender-name {
            margin-left: 0;
            margin-right: 0.5rem;
        }

        .message {
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message {
            background-color: var(--user-msg-bg);
            color: var(--text-color);
            border-bottom-right-radius: 4px;
        }

        .bot .message {
            background-color: transparent;
            color: var(--text-color);
            padding-left: 0.5rem;
        }

        #input-area {
            width: 100%;
            max-width: 800px;
            padding: 1rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            display: flex;
            width: 100%;
            background-color: var(--input-bg);
            border-radius: 32px;
            padding: 0.4rem 0.5rem 0.4rem 1.5rem;
            box-sizing: border-box;
            align-items: center;
            transition: box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 0 2px #3c4043;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 1rem;
            padding: 0.8rem 0;
        }

        input[type="text"]::placeholder {
            color: #80868b;
        }

        button {
            background: transparent;
            border: none;
            color: #8ab4f8;
            cursor: pointer;
            padding: 0.8rem;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        button:disabled {
            color: #4a4a4a;
            cursor: not-allowed;
        }

        button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .footer-note {
            font-size: 0.7rem;
            color: #747775;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nexus AI</h1>
        <div id="status">Initializing WebGPU...</div>
    </header>
    
    <div id="chat-container"></div>
    
    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask Nexus AI something..." disabled>
            <button id="send-btn" disabled aria-label="Send message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
        <div class="footer-note">Nexus AI uses WebGPU to run Qwen2.5-Coder locally on your GPU.</div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const selectedModel = "Qwen2.5-Coder-7B-Instruct-q4f16_1-MLC";
        
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const statusText = document.getElementById("status");

        let engine;
        let messages = [
            { role: "system", content: "You are Nexus AI, a highly advanced local coding assistant built on WebGPU. Provide exceptionally clean, accurate, and functional code." }
        ];

        async function initAI() {
            try {
                engine = await CreateMLCEngine(selectedModel, {
                    initProgressCallback: (progress) => {
                        // Strip internal text to keep the status bar clean
                        statusText.innerText = progress.text.replace(/\[.*\]/, '').trim();
                    }
                });
                
                statusText.innerText = "Local GPU Active";
                statusText.style.border = "1px solid #0f9d58";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            } catch (error) {
                statusText.innerText = "WebGPU Error";
                statusText.style.color = "#ea4335";
                console.error(error);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage("You", text, "user");
            messages.push({ role: "user", content: text });
            
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const botElements = appendMessage("Nexus AI", "Thinking...", "bot");
            const textElement = botElements.textElement;

            try {
                const chunks = await engine.chat.completions.create({
                    messages: messages,
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    fullResponse += content;
                    textElement.innerText = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                
                messages.push({ role: "assistant", content: fullResponse });
            } catch (error) {
                textElement.innerText = "An error occurred during local generation.";
                console.error(error);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(sender, text, type) {
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${type}`;

            const nameDiv = document.createElement("div");
            nameDiv.className = "sender-name";
            nameDiv.innerText = sender;

            const msgDiv = document.createElement("div");
            msgDiv.className = "message";
            msgDiv.innerText = text;

            wrapper.appendChild(nameDiv);
            wrapper.appendChild(msgDiv);
            chatContainer.appendChild(wrapper);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return { wrapperElement: wrapper, textElement: msgDiv };
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        initAI();
    </script>
</body>
</html>
